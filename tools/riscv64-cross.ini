# Meson 크로스 컴파일 설정 파일
# BPI-F3 (SpacemiT K1 RISC-V 64비트) 타겟

[binaries]
c = 'riscv64-linux-gnu-gcc'
cpp = 'riscv64-linux-gnu-g++'
ar = 'riscv64-linux-gnu-ar'
strip = 'riscv64-linux-gnu-strip'
pkgconfig = 'riscv64-linux-gnu-pkg-config'

[built-in options]
c_args = ['-march=rv64gc', '-mabi=lp64d']
c_link_args = ['-march=rv64gc', '-mabi=lp64d']
cpp_args = ['-march=rv64gc', '-mabi=lp64d']
cpp_link_args = ['-march=rv64gc', '-mabi=lp64d']

[properties]
# SpacemiT K1 (RVA22 profile)
# 8x X60 코어, rv64gc (IMAFDC)
sys_root = '/usr/riscv64-linux-gnu'
pkg_config_libdir = '/usr/riscv64-linux-gnu/lib/pkgconfig'

[host_machine]
system = 'linux'
cpu_family = 'riscv64'
cpu = 'rv64gc'
endian = 'little'
