# Meson 크로스 컴파일 설정 파일
# Canonical board-specific config lives in board/bpi-f3/cross-riscv64.ini.
# This copy is retained for backwards compatibility with existing scripts.
# Keep it semantically aligned with the board-specific file.

[binaries]
c = 'riscv64-linux-gnu-gcc'
cpp = 'riscv64-linux-gnu-g++'
ar = 'riscv64-linux-gnu-ar'
strip = 'riscv64-linux-gnu-strip'
pkgconfig = 'pkg-config'

[properties]
# SpacemiT K1 (RV64GC) — keep aligned with board/bpi-f3/cross-riscv64.ini
c_args = ['-march=rv64gc', '-mabi=lp64d', '-mcpu=spacemit-k1']
c_link_args = ['-march=rv64gc', '-mabi=lp64d']

[host_machine]
system = 'linux'
cpu_family = 'riscv64'
cpu = 'spacemit-k1'
endian = 'little'

[built-in options]
c_std = 'c11'
