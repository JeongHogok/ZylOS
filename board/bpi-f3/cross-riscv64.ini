# Meson cross-compilation file for RISC-V 64-bit (BPI-F3)
# Usage: meson setup builddir --cross-file board/bpi-f3/cross-riscv64.ini

[binaries]
c = 'riscv64-linux-gnu-gcc'
cpp = 'riscv64-linux-gnu-g++'
ar = 'riscv64-linux-gnu-ar'
strip = 'riscv64-linux-gnu-strip'
pkgconfig = 'pkg-config'

[properties]
# SpacemiT K1: RV64GCV (RV64IMAFDCV)
c_args = ['-march=rv64gc', '-mabi=lp64d', '-mcpu=spacemit-k1']
c_link_args = ['-march=rv64gc', '-mabi=lp64d']

[host_machine]
system = 'linux'
cpu_family = 'riscv64'
cpu = 'spacemit-k1'
endian = 'little'

[built-in options]
c_std = 'c11'
