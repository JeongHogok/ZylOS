name: Build
on: [push, pull_request]
jobs:
  build-native:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config \
            libwlroots-dev libwayland-dev wayland-protocols \
            libxkbcommon-dev libpixman-1-dev libinput-dev \
            libdrm-dev libegl-dev libgles2-mesa-dev libgbm-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev libjson-glib-dev
      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir
      - name: Check apps
        run: |
          # Verify all app manifests are valid JSON
          for f in apps/*/app.json; do
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done
          echo "All manifests valid"

  lint-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: |
          find apps/ emulator/ -name '*.js' | while read f; do
            node --check "$f" || exit 1
          done
          echo "All JS files parse OK"
