name: Build
on: [push, pull_request]
jobs:
  build-native:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel meson ninja pkgconf git \
            wayland wayland-protocols \
            libxkbcommon pixman libinput \
            libdrm mesa libglvnd \
            gtk4 json-glib \
            hwdata libdisplay-info \
            seatd wlroots \
            python
      - name: Build Zyl OS
        run: |
          meson setup builddir
          ninja -C builddir
      - name: Check apps
        run: |
          for f in apps/*/app.json; do
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done
          echo "All manifests valid"

  lint-html:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML DOCTYPE first line
        run: bash tests/test_doctype.sh

  lint-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: |
          find apps/ -name '*.js' | while read f; do
            node --check "$f" || exit 1
          done
          echo "All JS files parse OK"
