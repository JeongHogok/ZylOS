<!--
  ──────────────────────────────────────────────────────────
  [Clean Architecture] Presentation Layer - Page

  역할: Zyl OS 디바이스 에뮬레이터
  수행범위: 디바이스 프로필 선택 → 부팅 → 앱 라우팅 → 네비게이션
  의존방향: emulator.css, emulator.js
  SOLID: OCP — 디바이스 프로필 추가만으로 새 기종 지원
  ──────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyl OS Emulator</title>
  <link rel="stylesheet" href="css/emulator.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="backdrop"></div>

  <!-- ═══ 디바이스 선택 화면 (부팅 전) ═══ -->
  <div id="device-picker">
    <h1>Zyl OS Emulator</h1>
    <p class="picker-sub">Select a device to boot</p>
    <div id="device-list"></div>
  </div>

  <!-- ═══ 디바이스 프레임 (부팅 후) ═══ -->
  <div id="device-frame" class="hidden">
    <div id="device-notch"></div>
    <div id="device-screen">
      <div id="emu-statusbar">
        <span id="emu-time">00:00</span>
        <div class="emu-sb-right">
          <svg class="sb-ico" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg class="sb-ico" viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
          <span id="emu-battery">85%</span>
        </div>
      </div>

      <!-- 퀵설정 패널 (상태바 풀다운) -->
      <div id="qs-panel" class="qs-hidden">
        <div class="qs-handle"></div>
        <div class="qs-time" id="qs-time">16:20</div>
        <div class="qs-date" id="qs-date">3월 28일 토요일</div>
        <div class="qs-grid">
          <button class="qs-tile active" data-qs="wifi"><svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg><span>Wi-Fi</span></button>
          <button class="qs-tile" data-qs="bt"><svg viewBox="0 0 24 24"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg><span>BT</span></button>
          <button class="qs-tile" data-qs="airplane"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg><span>비행기</span></button>
          <button class="qs-tile" data-qs="silent"><svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg><span>무음</span></button>
          <button class="qs-tile" data-qs="rotate"><svg viewBox="0 0 24 24"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zM7.52 21.48c-3.27-1.55-5.61-4.72-5.97-8.48h-1.5C.56 19.16 5.71 24 12 24l.66-.03-3.81-3.81-1.33 1.32z"/></svg><span>회전</span></button>
          <button class="qs-tile" data-qs="flashlight"><svg viewBox="0 0 24 24"><path d="M6 14l3 3v5h6v-5l3-3V9H6v5zm5-12h2v3h-2V2zM3.5 5.88l1.41-1.41 2.12 2.12L5.62 8 3.5 5.88zm13.46.71l2.12-2.12 1.41 1.41L18.38 8l-1.42-1.41z"/></svg><span>손전등</span></button>
        </div>
        <div class="qs-brightness">
          <svg class="qs-bright-ico" viewBox="0 0 24 24"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
          <input type="range" id="qs-brightness" min="10" max="100" value="80">
        </div>
      </div>

      <div id="app-viewport">
        <iframe id="app-frame" src="" frameborder="0"></iframe>
      </div>

      <!-- 최근 앱 오버레이 -->
      <div id="recents-overlay" class="hidden">
        <div id="recents-header">최근 앱</div>
        <div id="recents-cards"></div>
        <div id="recents-empty">실행 중인 앱이 없습니다</div>
      </div>

      <!-- 네비게이션: 소프트키 -->
      <div id="nav-softkeys" class="nav-bar hidden">
        <button class="nav-sk-btn" id="sk-back"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <button class="nav-sk-btn nav-sk-home" id="sk-home"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="none" stroke="white" stroke-width="2"/></svg></button>
        <button class="nav-sk-btn" id="sk-recents"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1" fill="none" stroke="white" stroke-width="2"/></svg></button>
      </div>

      <!-- 네비게이션: 제스처 바 -->
      <div id="nav-gesture" class="nav-bar hidden">
        <div id="gesture-bar"></div>
      </div>
    </div>

    <!-- 네비게이션: 물리 버튼 -->
    <div id="nav-hardware" class="hidden">
      <button class="hw-btn" id="hw-back">◁</button>
      <button class="hw-btn hw-home" id="hw-home">○</button>
      <button class="hw-btn" id="hw-recents">□</button>
    </div>
  </div>

  <!-- ═══ 사이드 패널 (부팅 후) ═══ -->
  <div id="control-panel" class="hidden">
    <div id="device-info-header"></div>

    <div class="control-group">
      <label>Actions</label>
      <div class="btn-row">
        <button id="btn-power" class="ctrl-btn" title="Power"><svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg></button>
        <button id="btn-volup" class="ctrl-btn" title="Vol+"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        <button id="btn-voldown" class="ctrl-btn" title="Vol-"><svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg></button>
        <button id="btn-reboot" class="ctrl-btn ctrl-wide" title="Reboot">Reboot</button>
      </div>
    </div>

    <div class="control-group">
      <label>Running Apps</label>
      <div id="running-apps-list"></div>
    </div>

    <div class="control-group">
      <label>System Log</label>
      <div id="sys-log"></div>
    </div>
  </div>

  <script src="js/emulator.js"></script>
</body>
</html>
