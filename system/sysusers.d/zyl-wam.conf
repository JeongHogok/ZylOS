# ----------------------------------------------------------
# [Clean Architecture] Infrastructure Layer - System User
#
# 역할: zyl-wam 전용 비루트 system user/group 생성
# 수행범위: systemd-sysusers로 서비스 계정 정의
# 의존방향: systemd-sysusers
# SOLID: SRP — WAM 서비스 계정 생성만 담당
# ----------------------------------------------------------

g zyl-wam - -
u zyl-wam - "Zyl OS Web App Manager" /var/lib/zyl-os/wam /usr/sbin/nologin
m zyl-wam video
m zyl-wam render
