# ----------------------------------------------------------
# [Clean Architecture] Infrastructure Layer - Runtime Paths
#
# 역할: zyl-wam 서비스 상태/캐시/런타임 디렉터리 생성
# 수행범위: /var/lib, /var/cache, /run 경로 소유권/권한 보장
# 의존방향: systemd-tmpfiles
# SOLID: SRP — WAM 경로 provisioning만 담당
# ----------------------------------------------------------

d /var/lib/zyl-os/wam   0750 zyl-wam zyl-wam -
d /var/cache/zyl-os/wam 0750 zyl-wam zyl-wam -
d /run/zyl-wam          0700 zyl-wam zyl-wam -
