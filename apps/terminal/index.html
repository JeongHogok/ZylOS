<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<!-- Zyl OS: Terminal | Copyright (c) 2026 Zyl OS Project | MIT -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Terminal</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <h1 data-i18n="terminal.title">Terminal</h1>
    <div id="header-actions">
      <button id="btn-theme" class="header-btn" aria-label="Theme" title="Theme">
        <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-1 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      </button>
      <button id="btn-clear" class="header-btn" aria-label="Clear" title="Clear">
        <svg viewBox="0 0 24 24"><path d="M5 13h14v-2H5v2zm-2 4h14v-2H3v2zM7 7v2h14V7H7z"/></svg>
      </button>
      <button id="btn-info" class="header-btn" aria-label="Info">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      </button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div id="tab-bar" role="tablist" aria-label="Terminal tabs">
    <div id="tab-list"></div>
    <button id="btn-new-tab" class="tab-add-btn" aria-label="New Tab" title="New Tab">+</button>
  </div>

  <!-- Terminal Output -->
  <div id="terminal-output" role="main" aria-live="polite" aria-label="Terminal output">
    <div id="output-content"></div>
  </div>

  <!-- Input Area -->
  <div id="input-area">
    <span id="prompt">$ user@bpi-f3:~</span>
    <input type="text" id="command-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Command input">
  </div>

  <!-- Quick Keys -->
  <div id="quick-keys" role="group" aria-label="Quick keys">
    <button class="qkey" data-key="tab">Tab</button>
    <button class="qkey" data-key="ctrl">Ctrl</button>
    <button class="qkey" data-key="paste" id="qkey-paste">Paste</button>
    <button class="qkey" data-insert="|">|</button>
    <button class="qkey" data-insert="/">/</button>
    <button class="qkey" data-insert="-">-</button>
    <button class="qkey" data-insert="~">~</button>
    <button class="qkey" data-key="up" aria-label="Up">&uarr;</button>
    <button class="qkey" data-key="down" aria-label="Down">&darr;</button>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="js/terminal.js"></script>
</body>
</html>
