<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<!-- Zyl OS: Browser | Copyright (c) 2026 Zyl OS Project | MIT -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Browser</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/browser.css">
</head>
<body>
  <!-- Private Mode Indicator -->
  <div id="private-indicator" class="hidden">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    <span data-i18n="browser.private_mode">Private Mode</span>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar" role="navigation" aria-label="Tabs">
    <div id="tabs-container">
      <div class="tab active" data-tab="0" role="button" tabindex="0">
        <span class="tab-title" data-i18n="browser.new_tab">New Tab</span>
        <button class="tab-close" aria-label="Close tab">&times;</button>
      </div>
    </div>
    <button id="btn-new-tab" aria-label="New Tab">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </div>

  <!-- Navigation Bar -->
  <div id="nav-bar" role="navigation" aria-label="Browser navigation">
    <div id="nav-buttons">
      <button id="btn-back" class="nav-btn" disabled aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" disabled aria-label="Forward">
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
      <button id="btn-refresh" class="nav-btn" aria-label="Refresh">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
    <div id="url-bar">
      <svg class="url-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      <input type="text" id="url-input" placeholder="Search or enter URL" data-i18n-placeholder="browser.url_placeholder" aria-label="Address bar" autocomplete="off" spellcheck="false">
    </div>
    <button id="btn-bookmarks" class="nav-btn" aria-label="Bookmarks">
      <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
    </button>
    <button id="btn-menu" class="nav-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
  </div>

  <!-- Menu Popup -->
  <div id="menu-popup" class="hidden">
    <button class="menu-item" id="menu-copy-url">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      <span data-i18n="browser.menu_copy_url">Copy URL</span>
    </button>
    <button class="menu-item" id="menu-add-bookmark">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      <span data-i18n="browser.menu_add_bookmark">Add Bookmark</span>
    </button>
    <button class="menu-item" id="menu-history">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      <span data-i18n="browser.menu_history">History</span>
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="menu-private">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      <span data-i18n="browser.menu_private">Private Mode</span>
    </button>
    <button class="menu-item" id="menu-settings">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      <span data-i18n="browser.menu_settings">Settings</span>
    </button>
  </div>

  <!-- Menu Overlay -->
  <div id="menu-overlay" class="hidden"></div>

  <!-- Bookmarks Sidebar -->
  <div id="bookmarks-sidebar" class="hidden">
    <div id="bookmarks-header">
      <h2 data-i18n="browser.bookmarks">Bookmarks</h2>
      <button id="btn-close-bookmarks" aria-label="Close">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div id="bookmarks-list">
      <div style="padding:16px;opacity:0.5;text-align:center" data-i18n="browser.loading">Loading...</div>
    </div>
  </div>

  <!-- History Sidebar -->
  <div id="history-sidebar" class="hidden">
    <div id="history-header">
      <h2 data-i18n="browser.history">History</h2>
      <div id="history-header-actions">
        <button id="btn-clear-history" aria-label="Clear History">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
        <button id="btn-close-history" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- Webview Content Area -->
  <div id="webview-container" role="main">
    <!-- New Tab Page -->
    <div id="new-tab-page" class="active">
      <div id="ntp-logo">
        <svg viewBox="0 0 24 24" width="64" height="64"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <div id="ntp-search" role="search">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="ntp-search-input" placeholder="Search the web" data-i18n-placeholder="browser.search" aria-label="Search the web">
      </div>
      <div id="quick-links">
        <!-- Populated dynamically from BrowserService -->
      </div>
    </div>

    <!-- Web Page (real iframe rendering) -->
    <div id="web-page" class="hidden">
      <div id="page-loading">
        <div class="loading-spinner"></div>
        <span data-i18n="browser.loading">Loading...</span>
      </div>
      <iframe id="page-frame" src="" frameborder="0" sandbox="allow-scripts allow-forms allow-presentation" style="width:100%;height:100%;border:none;display:none"></iframe>
    </div>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="js/browser.js"></script>
</body>
</html>
