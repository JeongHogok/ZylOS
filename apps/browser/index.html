<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BPI-OS Browser</title>
  <link rel="stylesheet" href="css/browser.css">
</head>
<body>
  <!-- Tab Bar -->
  <div id="tab-bar">
    <div id="tabs-container">
      <div class="tab active" data-tab="0">
        <span class="tab-title" data-i18n="browser.new_tab">New Tab</span>
        <button class="tab-close">&times;</button>
      </div>
    </div>
    <button id="btn-new-tab" aria-label="New Tab">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </div>

  <!-- Navigation Bar -->
  <div id="nav-bar">
    <div id="nav-buttons">
      <button id="btn-back" class="nav-btn" disabled aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" disabled aria-label="Forward">
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
      <button id="btn-refresh" class="nav-btn" aria-label="Refresh">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
    <div id="url-bar">
      <svg class="url-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      <input type="text" id="url-input" placeholder="Search or enter URL" data-i18n-placeholder="browser.url_placeholder" autocomplete="off" spellcheck="false">
    </div>
    <button id="btn-bookmarks" class="nav-btn" aria-label="Bookmarks">
      <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
    </button>
    <button id="btn-menu" class="nav-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
  </div>

  <!-- Bookmarks Sidebar -->
  <div id="bookmarks-sidebar" class="hidden">
    <div id="bookmarks-header">
      <h2 data-i18n="browser.bookmarks">Bookmarks</h2>
      <button id="btn-close-bookmarks" aria-label="Close">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div id="bookmarks-list">
      <div class="bookmark-item" data-url="https://www.bpios.dev">
        <div class="bookmark-favicon">B</div>
        <div class="bookmark-info">
          <span class="bookmark-name">BPI-OS Official</span>
          <span class="bookmark-url">bpios.dev</span>
        </div>
      </div>
      <div class="bookmark-item" data-url="https://github.com/banana-pi">
        <div class="bookmark-favicon">G</div>
        <div class="bookmark-info">
          <span class="bookmark-name">GitHub - Banana Pi</span>
          <span class="bookmark-url">github.com/banana-pi</span>
        </div>
      </div>
      <div class="bookmark-item" data-url="https://wiki.banana-pi.org">
        <div class="bookmark-favicon">W</div>
        <div class="bookmark-info">
          <span class="bookmark-name">Banana Pi Wiki</span>
          <span class="bookmark-url">wiki.banana-pi.org</span>
        </div>
      </div>
      <div class="bookmark-item" data-url="https://riscv.org">
        <div class="bookmark-favicon">R</div>
        <div class="bookmark-info">
          <span class="bookmark-name">RISC-V Foundation</span>
          <span class="bookmark-url">riscv.org</span>
        </div>
      </div>
      <div class="bookmark-item" data-url="https://kernel.org">
        <div class="bookmark-favicon">K</div>
        <div class="bookmark-info">
          <span class="bookmark-name">The Linux Kernel</span>
          <span class="bookmark-url">kernel.org</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Webview Content Area -->
  <div id="webview-container">
    <!-- New Tab Page -->
    <div id="new-tab-page" class="active">
      <div id="ntp-logo">
        <svg viewBox="0 0 24 24" width="64" height="64"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <div id="ntp-search">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="ntp-search-input" placeholder="Search the web" data-i18n-placeholder="browser.search">
      </div>
      <div id="quick-links">
        <div class="quick-link" data-url="https://github.com">
          <div class="quick-link-icon" style="background: linear-gradient(135deg, #333, #111);">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>
          </div>
          <span>GitHub</span>
        </div>
        <div class="quick-link" data-url="https://youtube.com">
          <div class="quick-link-icon" style="background: linear-gradient(135deg, #ff0000, #cc0000);">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
          </div>
          <span>YouTube</span>
        </div>
        <div class="quick-link" data-url="https://wikipedia.org">
          <div class="quick-link-icon" style="background: linear-gradient(135deg, #eee, #ccc);">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="#333" d="M14.97 18.95L12 12.52l-2.97 6.43a.5.5 0 01-.91-.01L4.94 9.04a.5.5 0 11.92-.38l3.18 7.72L12 10.04l2.96 6.34 3.18-7.72a.5.5 0 01.92.38l-3.18 9.9a.5.5 0 01-.91.01z"/></svg>
          </div>
          <span>Wikipedia</span>
        </div>
        <div class="quick-link" data-url="https://riscv.org">
          <div class="quick-link-icon" style="background: linear-gradient(135deg, #4a9eff, #2563eb);">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-2-1h-6v-2h6v2zM7.5 17l-1.41-1.41L8.67 13l-2.59-2.59L7.5 9l4 4-4 4z"/></svg>
          </div>
          <span>RISC-V</span>
        </div>
      </div>
    </div>

    <!-- Loading Page (simulated webview) -->
    <div id="web-page" class="hidden">
      <div id="page-loading">
        <div class="loading-spinner"></div>
        <span data-i18n="browser.loading">Loading...</span>
      </div>
      <div id="page-content"></div>
    </div>
  </div>

  <script src="../../shared/bridge.js"></script>
  <script src="../../shared/i18n.js"></script>
  <script src="js/browser.js"></script>
</body>
</html>
