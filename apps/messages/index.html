<!DOCTYPE html>
<!-- Clean Architecture, SOLID principles, i18n rules strictly followed. Built for real device runtime; no mock/demo or hardcoded data allowed -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Messages</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/messages.css">
</head>
<body>
  <!-- Thread List View -->
  <div id="view-threads" class="view active">
    <div class="header">
      <span class="header-title" data-i18n="messages.title"></span>
      <button id="btn-new-message" class="header-action" aria-label="New message">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
    </div>
    <div id="thread-list" class="scroll-area zyl-scroll"></div>
    <div id="threads-empty" class="empty-state hidden">
      <svg viewBox="0 0 24 24" width="48" height="48"><path fill="rgba(255,255,255,0.15)" d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      <span data-i18n="messages.no_threads"></span>
    </div>
  </div>

  <!-- Chat View -->
  <div id="view-chat" class="view hidden">
    <div class="header chat-header">
      <button id="btn-chat-back" class="header-back" aria-label="Back">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span id="chat-contact-name" class="header-title"></span>
      <button id="btn-chat-call" class="header-action" aria-label="Call">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      </button>
    </div>
    <div id="chat-messages" class="zyl-scroll"></div>
    <div id="chat-input-bar">
      <input type="text" id="chat-input" data-i18n-placeholder="messages.type_message" autocomplete="off">
      <button id="btn-send" class="btn-send" aria-label="Send">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- New Message View -->
  <div id="view-new" class="view hidden">
    <div class="header">
      <button id="btn-new-back" class="header-back" aria-label="Back">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span class="header-title" data-i18n="messages.new"></span>
    </div>
    <div id="new-recipient-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="rgba(255,255,255,0.3)" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="new-recipient-input" data-i18n-placeholder="messages.search" autocomplete="off">
      </div>
    </div>
    <div id="new-contact-list" class="scroll-area zyl-scroll"></div>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/messages.js"></script>
</body></html>
