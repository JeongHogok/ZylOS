<!DOCTYPE html>
<!-- Clean Architecture, SOLID principles, i18n rules strictly followed. Built for real device runtime; no mock/demo or hardcoded data allowed -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Weather</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/weather.css">
</head>
<body>
  <!-- Scrollable content area -->
  <div id="weather-scroll" class="zyl-scroll" role="main">

    <!-- Current weather hero card -->
    <div id="current-card">
      <div id="current-top">
        <div id="location-row">
          <svg class="icon-loc" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
          <span id="location-name" data-i18n="weather.loading"></span>
        </div>
        <button id="btn-refresh" aria-label="Refresh">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
      </div>

      <div id="current-main">
        <div id="weather-icon-lg"></div>
        <div id="temp-block">
          <div id="temperature">--&deg;</div>
          <div id="condition">--</div>
        </div>
      </div>

      <div id="current-details">
        <div class="detail-item">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2zm0 18c-3.35 0-6-2.57-6-6.2 0-2.34 1.95-5.44 6-9.14 4.05 3.7 6 6.79 6 9.14 0 3.63-2.65 6.2-6 6.2z"/></svg>
          <span class="detail-value" id="humidity">--%</span>
          <span class="detail-label" data-i18n="weather.humidity"></span>
        </div>
        <div class="detail-item">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M14.5 17c0 1.65-1.35 3-3 3s-3-1.35-3-3c0-1.17.67-2.18 1.65-2.67L10.5 6h2l.35 8.33c.98.49 1.65 1.5 1.65 2.67z"/></svg>
          <span class="detail-value" id="feels-like">--&deg;</span>
          <span class="detail-label" data-i18n="weather.feels_like"></span>
        </div>
        <div class="detail-item">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M14.5 17c0 1.65-1.35 3-3 3s-3-1.35-3-3c0-1.17.67-2.18 1.65-2.67L10.5 6h2l.35 8.33A2.996 2.996 0 0114.5 17z" opacity="0"/><path fill="currentColor" d="M3.5 18.49l1.42-1.41 1.76 1.76-1.42 1.42L3.5 18.49zM11 22.99h2V20h-2v2.99zM3.97 6.1l1.42 1.42L7.15 5.76 5.73 4.34 3.97 6.1zM20.14 18.5l-1.76-1.76-1.42 1.42 1.76 1.76 1.42-1.42zM18.5 2.01L16.74 3.77l1.42 1.42 1.76-1.76L18.5 2.01zM5.61 11H2.01v2h3.6v-2zM12 5.5a6.5 6.5 0 000 13V5.5z" opacity="0"/><path fill="currentColor" d="M4 10.5v3h4l6 6V4.5l-6 6H4z"/></svg>
          <span class="detail-value" id="wind">-- m/s</span>
          <span class="detail-label" data-i18n="weather.wind"></span>
        </div>
        <div class="detail-item">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2L4 12h3v8h10v-8h3L12 2zm0 2.84L17.14 11H15v7H9v-7H6.86L12 4.84z"/></svg>
          <span class="detail-value" id="pressure">-- hPa</span>
          <span class="detail-label" data-i18n="weather.pressure"></span>
        </div>
      </div>
    </div>

    <!-- Hourly forecast -->
    <div id="hourly-section" class="card">
      <h3 class="section-title" data-i18n="weather.hourly"></h3>
      <div id="hourly-scroll">
        <div id="hourly-list"></div>
      </div>
    </div>

    <!-- 7-day forecast -->
    <div id="forecast-section" class="card">
      <h3 class="section-title" data-i18n="weather.forecast"></h3>
      <div id="forecast-list"></div>
    </div>

    <!-- Sun / UV info -->
    <div id="sun-section" class="card">
      <div class="sun-grid">
        <div class="sun-item">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#FFB300" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
          <span class="sun-label" data-i18n="weather.sunrise"></span>
          <span class="sun-value" id="sunrise">--:--</span>
        </div>
        <div class="sun-item">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#FF8A00" d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
          <span class="sun-label" data-i18n="weather.sunset"></span>
          <span class="sun-value" id="sunset">--:--</span>
        </div>
        <div class="sun-item">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#E040FB" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z"/></svg>
          <span class="sun-label" data-i18n="weather.uv_index"></span>
          <span class="sun-value" id="uv-index">--</span>
        </div>
        <div class="sun-item">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#42A5F5" d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
          <span class="sun-label" data-i18n="weather.cloud_cover"></span>
          <span class="sun-value" id="cloud-cover">--%</span>
        </div>
      </div>
    </div>

  </div><!-- /weather-scroll -->

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/weather.js"></script>
</body></html>
