<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Music</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/music.css">
</head>
<body>
  <!-- Header with tabs -->
  <div id="header">
    <h1 data-i18n="music.title">Music</h1>
    <div id="music-tabs">
      <button class="music-tab active" data-mtab="tracks" data-i18n="music.all_tracks">Tracks</button>
      <button class="music-tab" data-mtab="playlists" data-i18n="music.playlists">Playlists</button>
    </div>
  </div>

  <!-- Track List (all tracks) -->
  <div id="track-list" class="music-panel active" role="main"></div>

  <!-- Playlist Panel -->
  <div id="playlist-panel" class="music-panel hidden">
    <div id="playlist-list"></div>
    <div id="playlist-empty" class="empty-state" data-i18n="music.no_playlists">No playlists</div>
    <button id="btn-create-playlist" class="playlist-create-btn" data-i18n="music.create_playlist">+ New Playlist</button>
  </div>

  <!-- Playlist Detail View -->
  <div id="playlist-detail" class="music-panel hidden">
    <div id="playlist-detail-header">
      <button id="btn-playlist-back" class="pl-back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span id="playlist-detail-name"></span>
      <button id="btn-playlist-delete" class="pl-del-btn" aria-label="Delete playlist">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
    <div id="playlist-detail-tracks"></div>
    <div id="playlist-add-section">
      <button id="btn-add-to-playlist" data-i18n="music.add_tracks">+ Add Tracks</button>
    </div>
  </div>

  <!-- Add tracks to playlist picker -->
  <div id="track-picker" class="music-panel hidden">
    <div id="track-picker-header">
      <button id="btn-picker-back" class="pl-back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span data-i18n="music.add_tracks">Add Tracks</span>
      <button id="btn-picker-done" data-i18n="music.done">Done</button>
    </div>
    <div id="track-picker-list"></div>
  </div>

  <!-- Create playlist dialog -->
  <div id="create-pl-dialog" class="dialog-overlay hidden">
    <div class="dialog-card">
      <div class="dialog-title" data-i18n="music.create_playlist">New Playlist</div>
      <input type="text" id="create-pl-name" data-i18n-placeholder="music.playlist_name" placeholder="Playlist name" maxlength="40">
      <div class="dialog-actions">
        <button id="btn-create-pl-cancel" data-i18n="music.cancel">Cancel</button>
        <button id="btn-create-pl-save" class="dialog-primary" data-i18n="music.save">Save</button>
      </div>
    </div>
  </div>

  <!-- Now Playing / Player -->
  <div id="player">
    <!-- Album art + track info -->
    <div id="now-playing-info">
      <div id="album-art">
        <svg viewBox="0 0 24 24" width="40" height="40"><path fill="#555" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <div id="track-meta">
        <div id="now-playing-title" data-i18n="music.no_track">No track selected</div>
        <div id="now-playing-artist" data-i18n="music.unknown_artist">Unknown artist</div>
      </div>
    </div>

    <!-- Progress bar -->
    <div id="progress-container">
      <span id="time-current">0:00</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <input type="range" id="progress-seek" min="0" max="1000" value="0" step="1" aria-label="Seek position">
      </div>
      <span id="time-duration">0:00</span>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button id="btn-shuffle" class="ctrl-btn" aria-label="Shuffle" data-i18n-aria="music.shuffle">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button id="btn-prev" class="ctrl-btn" aria-label="Previous" data-i18n-aria="music.prev">
        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" class="ctrl-btn ctrl-play" aria-label="Play" data-i18n-aria="music.play">
        <svg id="icon-play" viewBox="0 0 24 24" width="36" height="36"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" width="36" height="36" class="hidden"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="btn-next" class="ctrl-btn" aria-label="Next" data-i18n-aria="music.next">
        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button id="btn-repeat" class="ctrl-btn" aria-label="Repeat" data-i18n-aria="music.repeat">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>

    <!-- Volume -->
    <div id="volume-container">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#888" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input type="range" id="volume-slider" min="0" max="100" value="80" step="1" aria-label="Volume">
    </div>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/music.js"></script>
</body>
</html>
