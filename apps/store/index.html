<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS App Store</title>
  <link rel="stylesheet" href="css/store.css">
</head>
<body>
  <div id="header">
    <h1 data-i18n="store.title">App Store</h1>
  </div>

  <div id="search-bar">
    <input type="text" id="search-input" data-i18n-placeholder="store.search_placeholder" placeholder="Search apps...">
  </div>

  <div id="tabs">
    <button class="tab active" id="tab-all" data-tab="all" data-i18n="store.tab_all">All</button>
    <button class="tab" id="tab-installed" data-tab="installed" data-i18n="store.tab_installed">Installed</button>
  </div>

  <div id="app-list"></div>

  <div id="empty-state" class="hidden">
    <div class="empty-icon">&#128230;</div>
    <div class="empty-text" data-i18n="store.empty">No apps found</div>
  </div>

  <div id="loading-state">
    <div class="loading-text" data-i18n="store.loading">Loading...</div>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/store.js"></script>
</body>
</html>
