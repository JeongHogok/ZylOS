<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Contacts</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/contacts.css">
</head>
<body>

  <!-- List View -->
  <div id="list-view">
    <div id="header">
      <h1 data-i18n="contacts.title">Contacts</h1>
      <button id="btn-add">+</button>
    </div>
    <div id="search-bar">
      <input type="text" id="search-input" data-i18n-placeholder="contacts.search" placeholder="Search">
    </div>
    <div id="contact-list"></div>
  </div>

  <!-- Detail View -->
  <div id="detail-view" class="hidden">
    <div id="detail-header">
      <button id="detail-back">&larr;</button>
    </div>
    <div id="detail-content">
      <div id="detail-avatar"></div>
      <div id="detail-name"></div>
      <div id="detail-phone"></div>
      <div id="detail-email"></div>
      <div id="detail-actions">
        <button id="btn-call" class="action-btn action-call" data-i18n="contacts.call">Call</button>
        <button id="btn-message" class="action-btn action-message" data-i18n="contacts.message">Message</button>
      </div>
      <div id="detail-manage">
        <button id="btn-edit" class="manage-btn" data-i18n="contacts.edit">Edit</button>
        <button id="btn-delete" class="manage-btn manage-delete" data-i18n="contacts.delete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Form View (Add / Edit) -->
  <div id="form-view" class="hidden">
    <div id="form-header">
      <button id="form-back">&larr;</button>
      <span id="form-title" data-i18n="contacts.add">Add Contact</span>
    </div>
    <div id="form-body">
      <label data-i18n="contacts.name">Name</label>
      <input type="text" id="input-name" data-i18n-placeholder="contacts.name" placeholder="Name">
      <label data-i18n="contacts.phone">Phone</label>
      <input type="tel" id="input-phone" data-i18n-placeholder="contacts.phone" placeholder="Phone">
      <label data-i18n="contacts.email">Email</label>
      <input type="email" id="input-email" data-i18n-placeholder="contacts.email" placeholder="Email">
      <div id="form-actions">
        <button id="btn-save" class="form-btn form-save" data-i18n="contacts.save">Save</button>
        <button id="btn-cancel" class="form-btn form-cancel" data-i18n="contacts.cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/contacts.js"></script>
</body>
</html>
