<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Calculator</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/calc.css">
</head>
<body>
  <div id="display" role="main">
    <div id="expression" aria-live="polite" aria-label="Expression"></div>
    <div id="result" aria-live="polite" aria-label="Result">0</div>
  </div>

  <!-- Mode toggle -->
  <div id="mode-bar">
    <button id="btn-mode" class="mode-btn" data-i18n="calc.scientific">SCI</button>
    <button id="btn-history" class="mode-btn" data-i18n="calc.history">History</button>
  </div>

  <!-- History panel -->
  <div id="history-panel" class="hidden">
    <div id="history-header">
      <span data-i18n="calc.history">History</span>
      <button id="btn-clear-history" data-i18n="calc.clear_history">Clear</button>
    </div>
    <div id="history-list"></div>
    <div id="history-empty" data-i18n="calc.no_history">No history</div>
  </div>

  <!-- Standard keypad -->
  <div id="keypad" role="group" aria-label="Calculator keypad">
    <button class="key fn" data-action="clear">C</button>
    <button class="key fn" data-action="backspace" aria-label="Backspace">&larr;</button>
    <button class="key fn" data-action="percent">%</button>
    <button class="key op" data-action="divide" aria-label="Divide">&divide;</button>
    <button class="key num" data-value="7">7</button>
    <button class="key num" data-value="8">8</button>
    <button class="key num" data-value="9">9</button>
    <button class="key op" data-action="multiply" aria-label="Multiply">&times;</button>
    <button class="key num" data-value="4">4</button>
    <button class="key num" data-value="5">5</button>
    <button class="key num" data-value="6">6</button>
    <button class="key op" data-action="subtract" aria-label="Subtract">&minus;</button>
    <button class="key num" data-value="1">1</button>
    <button class="key num" data-value="2">2</button>
    <button class="key num" data-value="3">3</button>
    <button class="key op" data-action="add">+</button>
    <button class="key num zero" data-value="0">0</button>
    <button class="key num" data-value=".">.</button>
    <button class="key eq" data-action="equals">=</button>
  </div>

  <!-- Scientific keypad (hidden by default) -->
  <div id="sci-keypad" class="hidden" role="group" aria-label="Scientific keypad">
    <button class="key sci" data-sci="sin">sin</button>
    <button class="key sci" data-sci="cos">cos</button>
    <button class="key sci" data-sci="tan">tan</button>
    <button class="key sci" data-sci="log">log</button>
    <button class="key sci" data-sci="ln">ln</button>
    <button class="key sci" data-sci="sqrt">&radic;</button>
    <button class="key sci" data-sci="pow">x<sup>y</sup></button>
    <button class="key sci" data-sci="pi">&pi;</button>
    <button class="key sci" data-sci="e">e</button>
    <button class="key sci" data-sci="paren_open">(</button>
    <button class="key sci" data-sci="paren_close">)</button>
    <button class="key sci" data-sci="factorial">x!</button>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="js/calc.js"></script>
</body></html>
