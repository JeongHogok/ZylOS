<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Calculator</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <link rel="stylesheet" href="css/calc.css">
</head>
<body>
  <div id="display">
    <div id="expression"></div>
    <div id="result">0</div>
  </div>
  <div id="keypad">
    <button class="key fn" data-action="clear">C</button>
    <button class="key fn" data-action="backspace">&larr;</button>
    <button class="key fn" data-action="percent">%</button>
    <button class="key op" data-action="divide">&divide;</button>
    <button class="key num" data-value="7">7</button>
    <button class="key num" data-value="8">8</button>
    <button class="key num" data-value="9">9</button>
    <button class="key op" data-action="multiply">&times;</button>
    <button class="key num" data-value="4">4</button>
    <button class="key num" data-value="5">5</button>
    <button class="key num" data-value="6">6</button>
    <button class="key op" data-action="subtract">&minus;</button>
    <button class="key num" data-value="1">1</button>
    <button class="key num" data-value="2">2</button>
    <button class="key num" data-value="3">3</button>
    <button class="key op" data-action="add">+</button>
    <button class="key num zero" data-value="0">0</button>
    <button class="key num" data-value=".">.</button>
    <button class="key eq" data-action="equals">=</button>
  </div>
  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="js/calc.js"></script>
</body></html>
