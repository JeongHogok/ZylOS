<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Lock Screen</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/lockscreen.css">
</head>
<body>
  <div id="wallpaper"></div>

  <!-- 파티클/별 효과 -->
  <div id="particles"></div>

  <!-- 잠금 해제 플래시 -->
  <div id="unlock-flash"></div>

  <!-- 잠금 화면 메인 -->
  <div id="lock-main">
    <div id="lock-time">00:00</div>
    <div id="lock-date"></div>

    <!-- 알림 미리보기 -->
    <div id="lock-notifications"></div>

    <!-- 하단 바로가기 (긴급전화 + 카메라) -->
    <div id="lock-shortcuts">
      <button id="btn-emergency" aria-label="Emergency call">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="white" aria-hidden="true">
          <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
        <span data-i18n="lock.emergency">Emergency</span>
      </button>
      <div id="swipe-hint">
        <div class="swipe-line"></div>
        <span data-i18n="lock.swipe">Swipe up to unlock</span>
      </div>
      <button id="btn-camera" aria-label="Camera">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="white" aria-hidden="true">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
        </svg>
        <span data-i18n="lock.camera">Camera</span>
      </button>
    </div>
  </div>

  <!-- PIN 입력 화면 (초기 숨김 — translateY로 제어) -->
  <div id="pin-screen" role="main">
    <div id="pin-title" data-i18n="lock.enter_pin">Enter PIN</div>

    <div id="pin-dots">
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
    </div>

    <div id="pin-error" data-i18n="lock.wrong_pin">Wrong PIN</div>

    <div id="numpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2<span class="num-sub">ABC</span></button>
      <button class="num-btn" data-num="3">3<span class="num-sub">DEF</span></button>
      <button class="num-btn" data-num="4">4<span class="num-sub">GHI</span></button>
      <button class="num-btn" data-num="5">5<span class="num-sub">JKL</span></button>
      <button class="num-btn" data-num="6">6<span class="num-sub">MNO</span></button>
      <button class="num-btn" data-num="7">7<span class="num-sub">PQRS</span></button>
      <button class="num-btn" data-num="8">8<span class="num-sub">TUV</span></button>
      <button class="num-btn" data-num="9">9<span class="num-sub">WXYZ</span></button>
      <button class="num-btn num-empty"></button>
      <button class="num-btn" data-num="0">0</button>
      <button class="num-btn num-delete" id="btn-delete" aria-label="Delete">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="white" aria-hidden="true">
          <path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/>
        </svg>
      </button>
    </div>

    <button id="btn-cancel" data-i18n="lock.cancel">Cancel</button>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/clock.js"></script>
  <script src="../shared/gesture.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/lockscreen.js"></script>
</body>
</html>
