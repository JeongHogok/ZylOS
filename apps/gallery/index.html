<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Gallery</title>
  <link rel="stylesheet" href="css/gallery.css">
</head>
<body>
  <div id="header"><h1>Gallery</h1></div>
  <div id="photo-grid"></div>
  <div id="viewer" class="hidden">
    <img id="viewer-img" src="">
    <!-- 비디오 플레이어 (동적 생성 시 컨트롤 영역) -->
    <div id="video-controls" class="hidden">
      <div id="vc-progress-bar">
        <div id="vc-progress-fill"></div>
        <input type="range" id="vc-seek" min="0" max="100" value="0">
      </div>
      <div id="vc-buttons">
        <button id="vc-skip-back" title="-10s">⏪</button>
        <button id="vc-play">▶</button>
        <button id="vc-skip-fwd" title="+10s">⏩</button>
        <span id="vc-time">0:00 / 0:00</span>
        <select id="vc-speed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>
    <button id="viewer-delete" title="Delete" style="position:absolute;bottom:20px;right:20px;background:rgba(239,68,68,0.8);border:none;color:white;width:44px;height:44px;border-radius:22px;font-size:20px;cursor:pointer;">🗑</button>
    <button id="viewer-close">&times;</button>
  </div>
  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/gallery.js"></script>
</body></html>
