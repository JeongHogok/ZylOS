<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Gallery</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/gallery.css">
</head>
<body>
  <div id="header" role="navigation">
    <h1 data-i18n="gallery.title">Gallery</h1>
    <div id="header-tabs">
      <button id="tab-all" class="header-tab active" aria-label="All"></button>
      <button id="tab-albums" class="header-tab" aria-label="Albums"></button>
    </div>
  </div>
  <div id="photo-grid" role="main"></div>
  <div id="album-grid" class="hidden" role="main"></div>
  <div id="viewer" class="hidden">
    <img id="viewer-img" src="" alt="Viewed media">
    <!-- 비디오 플레이어 (동적 생성 시 컨트롤 영역) -->
    <div id="video-controls" class="hidden">
      <div id="vc-progress-bar">
        <div id="vc-progress-fill"></div>
        <input type="range" id="vc-seek" min="0" max="100" value="0" aria-label="Seek">
      </div>
      <div id="vc-buttons">
        <button id="vc-skip-back" title="-10s" aria-label="Skip back 10 seconds">⏪</button>
        <button id="vc-play" aria-label="Play">▶</button>
        <button id="vc-skip-fwd" title="+10s" aria-label="Skip forward 10 seconds">⏩</button>
        <span id="vc-time">0:00 / 0:00</span>
        <select id="vc-speed" aria-label="Playback speed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>
    <!-- Slideshow controls -->
    <div id="slideshow-controls" class="hidden">
      <div id="slideshow-progress-bar"><div id="slideshow-progress-fill"></div></div>
      <span id="slideshow-status"></span>
    </div>
    <!-- Viewer action buttons -->
    <button id="viewer-rotate" aria-label="Rotate" style="position:absolute;bottom:20px;right:124px;background:rgba(99,102,241,0.8);border:none;color:white;width:44px;height:44px;border-radius:22px;font-size:20px;cursor:pointer;">↻</button>
    <button id="viewer-slideshow" aria-label="Slideshow" style="position:absolute;bottom:20px;right:176px;background:rgba(34,197,94,0.8);border:none;color:white;width:44px;height:44px;border-radius:22px;font-size:20px;cursor:pointer;">▶</button>
    <button id="viewer-delete" aria-label="Delete" style="position:absolute;bottom:20px;right:20px;background:rgba(239,68,68,0.8);border:none;color:white;width:44px;height:44px;border-radius:22px;font-size:20px;cursor:pointer;">🗑</button>
    <button id="viewer-close" aria-label="Close viewer">&times;</button>
  </div>
  <script src="../shared/i18n.js"></script>
  <script src="i18n.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="js/gallery.js"></script>
</body></html>
