<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BPI-OS Home</title>
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div id="wallpaper"></div>

  <!-- 시계 위젯 -->
  <div id="clock-widget">
    <div id="clock-time">00:00</div>
    <div id="clock-date"></div>
  </div>

  <!-- 검색바 -->
  <div id="search-bar">
    <input type="text" id="search-input" data-i18n-placeholder="search">
  </div>

  <!-- 앱 그리드 -->
  <div id="app-grid"></div>

  <!-- 페이지 인디케이터 -->
  <div id="page-indicator">
    <span class="dot active"></span>
    <span class="dot"></span>
  </div>

  <!-- 하단 독 -->
  <div id="dock">
    <div class="dock-app" data-app="com.bpios.browser">
      <div class="dock-icon icon-blue">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <span data-i18n="app.browser"></span>
    </div>
    <div class="dock-app" data-app="com.bpios.files">
      <div class="dock-icon icon-orange">
        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      </div>
      <span data-i18n="app.files"></span>
    </div>
    <div class="dock-app" data-app="com.bpios.terminal">
      <div class="dock-icon icon-gray">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-2-1h-6v-2h6v2zM7.5 17l-1.41-1.41L8.67 13l-2.59-2.59L7.5 9l4 4-4 4z"/></svg>
      </div>
      <span data-i18n="app.terminal"></span>
    </div>
    <div class="dock-app" data-app="com.bpios.settings">
      <div class="dock-icon icon-purple">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
      </div>
      <span data-i18n="app.settings"></span>
    </div>
  </div>

  <!-- Shared modules -->
  <script src="../shared/i18n.js"></script>
  <script src="../shared/clock.js"></script>
  <script src="../shared/bridge.js"></script>
  <!-- App script -->
  <script src="js/home.js"></script>
</body>
</html>
