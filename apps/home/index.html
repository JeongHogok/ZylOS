<!DOCTYPE html>
<!-- 클린아키텍처, SOLID원칙, i18n 규칙 철저 준수. 실제 디바이스 구동 기준이며, mock/demo 등 하드코딩 데이터가 있어서는 안 된다 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Home</title>
  <link rel="stylesheet" href="../shared/runtime.css">
  <script src="../shared/touch-scroll.js" defer></script>
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div id="wallpaper"></div>

  <!-- 시계 위젯 -->
  <div id="clock-widget">
    <div id="clock-time">00:00</div>
    <div id="clock-date"></div>
  </div>

  <!-- 검색바 -->
  <div id="search-bar">
    <input type="text" id="search-input" data-i18n-placeholder="search">
  </div>

  <!-- 앱 페이지 컨테이너 (좌우 스와이프) -->
  <div id="app-pages-viewport">
    <div id="app-pages-track">
      <div class="app-page" id="app-grid"></div>
    </div>
  </div>

  <!-- 페이지 인디케이터 -->
  <div id="page-indicator"></div>

  <!-- 하단 독 -->
  <div id="dock"></div>

  <!-- Shared modules -->
  <script src="../shared/i18n.js"></script>
  <script src="../shared/clock.js"></script>
  <script src="../shared/bridge.js"></script>
  <!-- App script -->
  <script>
    // Cache-bust all scripts in development
    var s = document.createElement('script');
    s.src = 'js/home.js?v=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
