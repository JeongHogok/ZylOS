<!DOCTYPE html>
<!-- Zyl OS: File Manager | Copyright (c) 2026 Zyl OS Project | MIT -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zyl OS Files</title>
  <link rel="stylesheet" href="css/files.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <button id="btn-back" class="header-btn hidden" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1 id="header-title" data-i18n="files.title">Files</h1>
    <div id="header-actions">
      <button id="btn-sort" class="header-btn" aria-label="Sort">
        <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
      </button>
      <button id="btn-view" class="header-btn" aria-label="View">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </button>
    </div>
  </header>

  <!-- Storage Bar -->
  <div id="storage-bar">
    <div id="storage-info">
      <span id="storage-label" data-i18n="files.storage">Storage</span>
      <span id="storage-value">12.3 GB / 16 GB</span>
    </div>
    <div id="storage-track">
      <div id="storage-fill" style="width: 77%;"></div>
    </div>
    <div id="storage-breakdown">
      <div class="storage-cat">
        <span class="cat-dot" style="background:#4a9eff;"></span>
        <span data-i18n="files.system">System</span>
        <span class="cat-size">4.2 GB</span>
      </div>
      <div class="storage-cat">
        <span class="cat-dot" style="background:#f472b6;"></span>
        <span data-i18n="files.media">Media</span>
        <span class="cat-size">5.1 GB</span>
      </div>
      <div class="storage-cat">
        <span class="cat-dot" style="background:#fbbf24;"></span>
        <span data-i18n="files.apps">Apps</span>
        <span class="cat-size">2.1 GB</span>
      </div>
      <div class="storage-cat">
        <span class="cat-dot" style="background:#94a3b8;"></span>
        <span data-i18n="files.other">Other</span>
        <span class="cat-size">0.9 GB</span>
      </div>
    </div>
  </div>

  <!-- Breadcrumb -->
  <div id="breadcrumb">
    <span class="crumb active" data-path="/">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </span>
  </div>

  <!-- Sort Menu -->
  <div id="sort-menu" class="hidden">
    <div class="sort-option active" data-sort="name">
      <span data-i18n="files.sort_name">Name</span>
      <svg class="check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <div class="sort-option" data-sort="date">
      <span data-i18n="files.sort_date">Date</span>
      <svg class="check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <div class="sort-option" data-sort="size">
      <span data-i18n="files.sort_size">Size</span>
      <svg class="check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
  </div>

  <!-- File List -->
  <div id="file-list"></div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden">
    <div class="ctx-item" data-action="open">
      <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
      <span data-i18n="files.open">Open</span>
    </div>
    <div class="ctx-item" data-action="rename">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <span data-i18n="files.rename">Rename</span>
    </div>
    <div class="ctx-item" data-action="share">
      <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
      <span data-i18n="files.share">Share</span>
    </div>
    <div class="ctx-divider"></div>
    <div class="ctx-item ctx-danger" data-action="delete">
      <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      <span data-i18n="files.delete">Delete</span>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay" class="hidden"></div>

  <!-- FAB -->
  <button id="fab" aria-label="Add">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>

  <script src="../../shared/bridge.js"></script>
  <script src="../../shared/i18n.js"></script>
  <script src="js/files.js"></script>
</body>
</html>
